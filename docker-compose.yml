services:
  file-storage:
    build: .
    container_name: file-storage-app
    restart: on-failure
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=10530
    volumes:
      - /var/lib/app-file-storage:/var/lib/app-file-storage
      - /var/log/app-file-storage:/var/log/app-file-storage
    ports:
      - "10530:10530"
    networks:
      - file-storage-network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: file-storage-onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=true
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
      - JWT_SECRET=${JWT_SECRET}
      - ALLOW_PRIVATE_IP_ADDRESS=true
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
    networks:
      - file-storage-network

  nginx:
    image: nginx:alpine
    container_name: file-storage-nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - file-storage
      - onlyoffice
    networks:
      - file-storage-network

networks:
  file-storage-network:
    driver: bridge

volumes:
  node_modules:
  onlyoffice-data:
  onlyoffice-logs:

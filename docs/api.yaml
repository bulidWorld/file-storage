openapi: "3.0.3"
info:
  title: File Storage API
  description: 文件上传、下载、查询、版本管理的 RESTful API
  version: "1.0.0"
servers:
  - url: /api/v1

tags:
  - name: Auth
    description: 认证接口
  - name: Files
    description: 文件管理（上传、查询、详情、更新、删除）
  - name: Versions
    description: 文件版本管理（列表、回滚）
  - name: Download
    description: 文件下载
  - name: Folders
    description: 文件夹管理

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      description: 通过 LDAP 认证登录，返回 JWT Token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: "zhiwenxia"
                password:
                  type: string
                  format: password
                  example: "********"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 缺少用户名或密码
        "401":
          description: 认证失败
        "500":
          description: 服务器内部错误

  /files:
    get:
      tags: [Files]
      summary: 查询文件列表
      description: 获取当前用户的所有文件，支持按文件夹筛选
      operationId: getFiles
      parameters:
        - name: folderPath
          in: query
          description: 文件夹路径，例如 `/project/doc`，为空则返回根目录所有文件
          required: false
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 文件列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"
        "401":
          description: 未认证
        "404":
          description: 用户不存在
        "500":
          description: 服务器内部错误

    post:
      tags: [Files]
      summary: 上传文件
      description: 上传新文件，支持指定文件夹和修改日志
      operationId: uploadFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 文件内容
                changeLog:
                  type: string
                  description: 修改说明
                  example: "Initial upload"
                folderPath:
                  type: string
                  description: 目标文件夹路径
                  example: "/project/doc"
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "400":
          description: 未提供文件
        "401":
          description: 未认证
        "500":
          description: 服务器内部错误

  /files/{id}:
    get:
      tags: [Files]
      summary: 获取文件详情
      description: 根据文件 publicId 获取文件详情，包含版本列表、文件夹和创建者信息
      operationId: getFileDetail
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: 文件详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: 未认证
        "403":
          description: 无权访问该文件
        "404":
          description: 文件不存在
        "500":
          description: 服务器内部错误

    put:
      tags: [Files]
      summary: 更新文件（新增版本）
      description: 上传文件新版本，旧版本标记为非当前版本
      operationId: updateFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/fileId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 新的文件内容
                changeLog:
                  type: string
                  description: 修改说明
                  example: "Updated content"
      responses:
        "200":
          description: 更新成功，返回包含新版本的完整文件信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: 未认证
        "403":
          description: 无权修改该文件
        "404":
          description: 文件或用户不存在
        "500":
          description: 服务器内部错误

    delete:
      tags: [Files]
      summary: 删除文件
      description: 软删除文件，设置 deletedAt 和 deletedBy
      operationId: deleteFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: 未认证
        "403":
          description: 无权删除该文件
        "404":
          description: 文件不存在
        "500":
          description: 服务器内部错误

  /files/{id}/download:
    get:
      tags: [Download]
      summary: 下载文件
      description: 下载文件的最新版本，返回文件二进制流
      operationId: downloadFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: 文件内容
          headers:
            Content-Type:
              schema:
                type: string
              description: 文件的 MIME 类型
            Content-Disposition:
              schema:
                type: string
              description: 'attachment; filename="xxx"'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: 未认证
        "403":
          description: 无权下载该文件
        "404":
          description: 文件或版本不存在
        "500":
          description: 服务器内部错误

  /files/{id}/versions:
    get:
      tags: [Versions]
      summary: 获取文件版本列表
      description: 获取指定文件的所有版本，按版本号倒序排列
      operationId: getVersions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: 版本列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionListResponse"
        "401":
          description: 未认证
        "403":
          description: 无权访问该文件
        "404":
          description: 文件不存在
        "500":
          description: 服务器内部错误

  /files/{id}/rollback/{versionId}:
    post:
      tags: [Versions]
      summary: 回滚到指定版本
      description: 将文件回滚到指定版本，创建新的版本记录
      operationId: rollback
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/fileId"
        - name: versionId
          in: path
          description: 目标版本 publicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 回滚成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: 未认证
        "403":
          description: 无权操作该文件
        "404":
          description: 文件、用户或版本不存在
        "500":
          description: 服务器内部错误

  /folders:
    get:
      tags: [Folders]
      summary: 获取文件夹列表
      description: 根据 parentPath 获取指定父文件夹下的子文件夹，不提供则返回根文件夹
      operationId: getFolders
      security:
        - bearerAuth: []
      parameters:
        - name: parentPath
          in: query
          description: 父文件夹路径，不提供则返回根文件夹列表
          required: false
          schema:
            type: string
            example: "/project"
      responses:
        "200":
          description: 文件夹列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListResponse"
        "401":
          description: 未认证
        "404":
          description: 用户不存在
        "500":
          description: 服务器内部错误

    post:
      tags: [Folders]
      summary: 创建文件夹
      description: 创建新文件夹，支持指定父文件夹路径
      operationId: createFolder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: 文件夹名称
                  example: "Project"
                parentPath:
                  type: string
                  description: 父文件夹路径，不指定则为根文件夹
                  example: "/root"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResponse"
        "400":
          description: 缺少文件夹名称
        "401":
          description: 未认证
        "404":
          description: 父文件夹不存在
        "409":
          description: 文件夹已存在
        "500":
          description: 服务器内部错误

  /folders/all:
    get:
      tags: [Folders]
      summary: 获取所有文件夹
      description: 获取当前用户的所有文件夹，按路径升序排列
      operationId: getAllFolders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 所有文件夹列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListResponse"
        "401":
          description: 未认证
        "404":
          description: 用户不存在
        "500":
          description: 服务器内部错误

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 登录后获取的 JWT Token，请求时在 Header 中设置 `Authorization: Bearer <token>`

  parameters:
    fileId:
      name: id
      in: path
      description: 文件 publicId
      required: true
      schema:
        type: string

  schemas:
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT Token
        user:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            email:
              type: string
            name:
              type: string

    FileRecord:
      type: object
      properties:
        id:
          type: integer
        publicId:
          type: string
          description: 文件唯一标识，用于 API 调用
        name:
          type: string
          description: 文件名
        mimeType:
          type: string
          nullable: true
          description: 文件 MIME 类型
        currentVersionId:
          type: integer
          nullable: true
        currentVersion:
          $ref: "#/components/schemas/Version"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/Version"
        folder:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            path:
              type: string
        creator:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            username:
              type: string
            name:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Version:
      type: object
      properties:
        id:
          type: integer
        publicId:
          type: string
          description: 版本唯一标识，用于回滚操作
        versionNumber:
          type: integer
          description: 版本号，从 1 开始递增
        fileSize:
          type: integer
          description: 文件大小（字节）
        checksum:
          type: string
          description: SHA-256 文件校验和
        changeLog:
          type: string
          nullable: true
          description: 修改说明
        createdAt:
          type: string
          format: date-time
        isCurrent:
          type: boolean
          description: 是否为当前版本

    Folder:
      type: object
      properties:
        id:
          type: integer
        publicId:
          type: string
        name:
          type: string
        path:
          type: string
          description: 文件夹路径，例如 `/project/doc`
        parentId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FileListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FileRecord"

    FileResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/FileRecord"

    VersionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Version"

    FolderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Folder"

    FolderResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Folder"
